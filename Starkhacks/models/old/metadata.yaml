# Legacy float32 TFLite models (CPU only)
# Run scripts/download_models.py to get Qualcomm AI Hub NPU-optimised versions.
# Downloaded models are tracked in qai_manifest.json (generated by download script).
#
# Qualcomm AI Hub sources:
#   hand_detection      : qualcomm/MediaPipe-Hand-Detection       (HuggingFace)
#   gesture_recognition : qualcomm/MediaPipe-Hand-Gesture-Recognition  (HuggingFace)
model_files:
  HandDetector.tflite:
    inputs:
      image:
        shape: [1, 256, 256, 3]
        dtype: float32
    outputs:
      box_coords:
        shape: [1, 2944, 18]
        dtype: float32
      box_scores:
        shape: [1, 2944, 1]
        dtype: float32
  HandLandmarkDetector.tflite:
    inputs:
      image:
        shape: [1, 256, 256, 3]
        dtype: float32
    outputs:
      scores:
        shape: [1]
        dtype: float32
      lr:
        shape: [1]
        dtype: float32
      landmarks:
        shape: [1, 21, 3]
        dtype: float32
